{% assign s = site.data.site %}
<a class="skip-link" href="#main">Ir al contenido</a>
<header class="site-header">
  <div class="container nav">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ s.brand.name }}">
      <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="{{ s.brand.name }}" height="48">
    </a>
    <nav aria-label="Principal">
      {% for item in s.nav %}
        {% if item.primary %}
          <a class="btn btn-primary" href="{{ item.url | relative_url }}">{{ item.label }}</a>
        {% else %}
          <a href="{{ item.url | relative_url }}">{{ item.label }}</a>
        {% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
