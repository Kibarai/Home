---
layout: null
permalink: /
sitemap: false
---
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kibarai</title>
  {%- comment -%}
    hreflang alternates so search engines index each language home.
  {%- endcomment -%}
  {%- for lang in site.languages -%}
    {%- assign l = site.data.i18n[lang] -%}
    <link rel="alternate" hreflang="{{ l.meta.html_lang }}" href="{{ l.urls.home | relative_url }}">
  {%- endfor -%}
  <link rel="alternate" hreflang="x-default" href="{{ site.data.i18n[site.fallback_lang].urls.home | relative_url }}">
  <meta name="robots" content="noindex,follow">
</head>
<body>
<script>
(function () {
  {%- assign home_map = "" -%}
  {%- assign codes_map = "" -%}
  {%- for lang in site.languages -%}
    {%- assign l = site.data.i18n[lang] -%}
    {%- assign home_map = home_map | append: '"' | append: lang | append: '":"' | append: l.urls.home | append: '",' -%}
    {%- for c in l.meta.browser_codes -%}
      {%- assign codes_map = codes_map | append: '"' | append: c | downcase | append: '":"' | append: lang | append: '",' -%}
    {%- endfor -%}
  {%- endfor -%}
  var HOMES = { {{ home_map | remove_last: ',' }} };
  var CODES = { {{ codes_map | remove_last: ',' }} };
  var FALLBACK = "{{ site.fallback_lang }}";
  var BASEURL = "{{ site.baseurl }}";
  var STORAGE_KEY = "kibarai_lang";

  function pickLang() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved && HOMES[saved]) return saved;
    } catch (e) {}
    var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || ""];
    for (var i = 0; i < langs.length; i++) {
      var full = (langs[i] || "").toLowerCase();
      if (CODES[full]) return CODES[full];
      var base = full.split("-")[0];
      if (CODES[base]) return CODES[base];
    }
    return FALLBACK;
  }
  var target = pickLang();
  location.replace(BASEURL + HOMES[target]);
})();
</script>
<noscript>
  <p>
    {%- for lang in site.languages -%}
      {%- assign l = site.data.i18n[lang] -%}
      <a href="{{ l.urls.home | relative_url }}">{{ l.meta.self_name }}</a>{% unless forloop.last %} · {% endunless %}
    {%- endfor -%}
  </p>
</noscript>
</body>
</html>
