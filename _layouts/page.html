---
layout: default
---
<article class="page">
  <div class="container-narrow">
    {% if page.title %}
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
      </header>
    {% endif %}
    <div class="prose">
      {{ content }}
    </div>
  </div>
</article>
