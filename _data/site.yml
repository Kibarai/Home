brand:
  name: Kibarai
  tagline: Software y soluciones de IA a medida.

nav:
  - { label: Servicios, url: /servicios/ }
  - { label: Nosotros, url: /nosotros/ }
  - { label: Blog, url: /blog/ }
  - { label: Contacto, url: /contacto/, primary: true }

hero:
  title: Software que funciona. IA que aporta. Sin humo.
  subtitle: |
    Somos Kibarai. Una consultora tecnológica pequeña, con ganas de resolver problemas reales.
    Hacemos software a medida, integramos IA generativa y ayudamos a decidir antes de escribir una sola línea de código.
    Cuando terminamos, el código es tuyo.
  cta_label: Cuéntanos tu proyecto
  cta_url: /contacto/
  secondary_cta_label: Ver servicios
  secondary_cta_url: /servicios/

home_intro:
  title: Tres cosas hacemos aquí
  body: |
    Consultoría, software a medida y aplicaciones con IA. Las tres, con equipos pequeños y ciclos cortos.
    Ni PowerPoints eternos, ni facturas por trabajo que nunca ves, ni tecnología por moda.
    Elige por dónde empezar.
  card_link_label: Descubrir más

process:
  title: Un proceso claro. Sin sorpresas.
  subtitle: |
    No hay magia. Hay ciclos cortos, reuniones semanales y decisiones que se toman con datos, no con opiniones.
    Lo verás avanzar cada semana.
  steps:
    - { icon: search, title: Descubrir, body: 'Antes de escribir código, entendemos tu negocio. Tu equipo, tus restricciones, tu punto de dolor real. Si podemos resolverlo con menos, te lo decimos.' }
    - { icon: build,  title: Construir, body: 'Trabajamos en ciclos semanales. Cada semana ves un avance funcional. Si algo no encaja, cambia. Sin peleas de alcance.' }
    - { icon: grow,   title: Evolucionar, body: 'El software que entregamos vive contigo. Medimos, aprendemos y ajustamos. Lo que funciona se queda. Lo que no, se elimina.' }

blog_section:
  title: Últimas noticias
  featured_label: Destacado
  read_label: Leer artículo

cta:
  title: ¿Hablamos de tu proyecto?
  body: |
    Cuéntanos en qué estás trabajando. Sin compromiso. Nos pondremos en contacto contigo con una primera lectura y, si tiene sentido, con un plan concreto.
  button_label: Escríbenos
  button_url: /contacto/

pages:
  blog:
    title: Noticias
    subtitle: Notas técnicas del equipo. Cosas que aprendemos por el camino, casos reales y opiniones sin filtro. Sin relleno.
  servicios:
    title: En qué te podemos ayudar
    subtitle: |
      Tres formas de trabajar con nosotros. La que necesites, la que encaje mejor con dónde está tu producto ahora.
      Si no lo tienes claro, te decimos por dónde empezar sin compromiso.
    cta_title: ¿No sabes cuál encaja mejor?
    cta_body: Cuéntanos dónde estás y qué necesitas. Te decimos por dónde empezar y qué tiene sentido. Aunque no seamos nosotros los que lo hagamos.
    cta_button_label: Escríbenos
    cta_button_url: /contacto/
  nosotros:
    title: Somos Kibarai
    subtitle: |
      Una consultora tecnológica pequeña e independiente. No queremos ser la agencia de mil personas. Queremos ser el equipo al que llamas cuando algo importa.
      Ayudamos a empresas a tomar mejores decisiones sobre su software y a construir producto que funciona de verdad.
    values_title: Cómo pensamos
    values:
      - { title: Menos es más, body: 'El mejor código es el que no hay que escribir. Y el segundo mejor, el que se puede borrar sin miedo.' }
      - { title: Entregas cortas, body: 'Preferimos enseñarte algo que funciona el viernes que discutir cómo debería funcionar durante un mes.' }
      - { title: Honestidad técnica, body: 'Si tu problema no necesita el software que crees que necesita, te lo decimos. Y si otro proveedor lo resuelve mejor, también.' }
  contacto:
    title: Hablemos
    subtitle: |
      Cuéntanos en qué estás trabajando. En qué fase estás, qué necesitas, qué plazo manejas.
      Cuanto más concreto seas, mejor podremos ayudarte. Nos pondremos en contacto contigo.
    email_label: Email
    linkedin_label: LinkedIn
    body: |
      No te vamos a pasar un formulario de veinte campos ni te vamos a llamar cada dos días.
      Un correo bien escrito nos vale.

contact:
  email: contacto@kibarai.tech
  linkedin: https://www.linkedin.com/company/kibarai

footer:
  about: |
    Consultora tecnológica pequeña, independiente y con base en España.
    Hacemos software a medida y aplicaciones con IA para empresas que necesitan que las cosas funcionen.
  columns:
    - heading: Empresa
      links:
        - { label: Servicios, url: /servicios/ }
        - { label: Nosotros, url: /nosotros/ }
        - { label: Blog, url: /blog/ }
    - heading: Recursos
      links:
        - { label: Contacto, url: /contacto/ }
        - { label: RSS, url: /feed.xml }
  legal_heading: Legal
  legal_links:
