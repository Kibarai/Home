    cta_button_label: Hablar con nosotros
    cta_button_url: /contacto/
  nosotros:
    title: Sobre Kibarai
    subtitle: Somos una consultora tecnológica independiente. Ayudamos a empresas a tomar mejores decisiones sobre su software y a construir producto que funciona.
    values_title: Cómo pensamos
    values:
      - { title: Menos es más, body: El mejor código es el que no hay que escribir. }
      - { title: Entregas cortas, body: Preferimos iterar sobre algo real que discutir sobre algo hipotético. }
      - { title: Honestidad técnica, body: Si algo no tiene sentido para tu negocio, te lo decimos. }
