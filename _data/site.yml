hero:
  title: Software que funciona. IA que aporta. Decisiones que aguantan.
  subtitle: Trabajamos con quienes se juegan la próxima elección tecnológica de su empresa. Hacemos software a medida, integramos IA generativa y ayudamos a decidir con criterio antes de comprometer presupuesto. Contigo cada semana, con entregas que puedes enseñar a tu equipo y a tu dirección, y con el código en tus manos desde el primer día.
  cta_label: Cuéntanos tu proyecto
  cta_url: /contacto/
  secondary_cta_label: Ver servicios
  secondary_cta_url: /servicios/

home_intro:
  title: Tres cosas hacemos aquí
  body: Consultoría tecnológica, software a medida y aplicaciones con IA. Las tres, con equipos pequeños, ciclos cortos y decisiones tomadas contigo. Elige por dónde empezar.
  card_link_label: Descubrir más

process:
  title: Un proceso claro y trazable
  subtitle: Ciclos cortos, reuniones semanales y decisiones basadas en datos. Verás avanzar tu proyecto cada semana y podrás enseñárselo a tu equipo con la tranquilidad de que ya funciona.
  steps:
    - { icon: search, title: Descubrir, body: 'Antes de escribir código, entendemos tu negocio, tu equipo y las restricciones reales. Si hay un camino más corto para llegar a tu objetivo, te lo proponemos con datos delante.' }
    - { icon: build,  title: Construir, body: 'Trabajamos en ciclos semanales. Cada semana ves un avance funcional que puedes probar y enseñar internamente. El alcance evoluciona con lo que descubres.' }
    - { icon: grow,   title: Evolucionar, body: 'El software que entregamos vive contigo. Medimos, aprendemos y ajustamos con datos de uso real. Lo que aporta se consolida y lo que sobra se retira.' }

blog_section:
  title: Últimas noticias
  featured_label: Destacado
  read_label: Leer artículo

cta:
  title: ¿Hablamos de tu proyecto?
  body: Cuéntanos en qué estás trabajando. Te responderemos con una primera lectura del reto y, si tiene sentido, con un plan concreto para avanzar contigo.
  button_label: Escríbenos
  button_url: /contacto/

pages:
  blog:
    title: Noticias
    subtitle: Notas técnicas del equipo. Aprendizajes del día a día, casos reales y decisiones que hemos tomado por el camino.
  servicios:
    title: En qué te podemos ayudar
    subtitle: Tres formas de trabajar con nosotros, pensadas para donde está tu producto ahora. Si quieres una recomendación antes de decidir, escríbenos y te decimos por dónde empezar.
    cta_title: ¿Prefieres una recomendación antes de empezar?
    cta_body: Cuéntanos dónde estás y qué necesitas. Te diremos por dónde empezar y qué tiene sentido para ti, incluso cuando el proveedor adecuado para una parte sea otro.
    cta_button_label: Escríbenos
    cta_button_url: /contacto/
  nosotros:
    title: Somos Kibarai
    subtitle: Una consultora tecnológica pequeña e independiente. Trabajamos con quienes se juegan la reputación al elegir tecnología — CTOs, directores de producto, founders y responsables de IT que necesitan que la próxima decisión salga bien. Nuestro trabajo es que puedas defenderla con datos.
    values_title: Cómo pensamos
    values:
      - { title: Menos es más, body: 'El mejor código es el que resuelve tu problema con la menor complejidad posible. Menos superficie que mantener significa menos riesgo para ti y para tu equipo.' }
      - { title: Entregas cortas, body: 'Cada semana verás algo funcional. Te llevarás demos y avances concretos que puedes enseñar a tu equipo o a tu dirección con confianza.' }
      - { title: Honestidad técnica, body: 'Te contamos qué encaja con tu negocio y qué queda mejor con otro proveedor. La confianza se gana diciendo lo que conviene, aunque no sea lo que más nos convenga a nosotros.' }
  contacto:
    title: Hablemos
    subtitle: Cuéntanos en qué estás trabajando. En qué fase estás, qué necesitas y qué plazo manejas. Cuanto más concreto seas, mejor podremos ayudarte. Te responderemos con una primera lectura.
    email_label: Email
    linkedin_label: LinkedIn
    body: Un correo bien escrito nos vale. Preferimos hablar de lo que necesitas y proponer con criterio antes de llenar tu bandeja de entrada.

contact:
  email: contacto@kibarai.tech
  linkedin: https://www.linkedin.com/company/kibarai

