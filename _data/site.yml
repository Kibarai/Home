  card_link_label: Descubrir más

process:
  title: Un proceso claro, sin sorpresas
  subtitle: Ciclos cortos, entregas frecuentes y decisiones tomadas con datos, no con opiniones.
  steps:
    - { icon: search, title: Descubrir, body: Entendemos tu negocio, tu equipo y las restricciones reales antes de escribir una línea. }
    - { icon: build,  title: Construir, body: Entregamos software funcional cada semana, con calidad de producción desde la primera iteración. }
    - { icon: grow,   title: Evolucionar, body: Medimos, aprendemos y ajustamos. La solución final se parece poco a la del día uno, y es mejor. }

