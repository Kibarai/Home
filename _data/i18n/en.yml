hero:
  title: Software that works. AI that adds value. Decisions that hold up.
  subtitle: We work with people whose next technology decision matters. We build
    custom software, integrate generative AI and help you decide with judgment
    before you commit budget. Weekly cadence, deliveries you can show your team
    and your leadership, and the code in your hands from day one.
  cta_label: Tell us about your project
  cta_url: /en/contact/
  secondary_cta_label: See services
  secondary_cta_url: /en/services/

home_intro:
  title: Three things we do here
  body: Technology consulting, custom software and AI applications. All three
    with small teams, short cycles and decisions made together with you. Pick
    where to start.
  card_link_label: Learn more

process:
  title: A clear, traceable process
  subtitle: Short cycles, weekly meetings and data-driven decisions. You will
    see your project move forward every week and you will be able to show it
    to your team knowing it already works.
  steps:
    - icon: search
      title: Discover
      body: Before writing code we understand your business, your team and
        your real constraints. If there is a shorter path to your goal we
        propose it with data on the table.
    - icon: build
      title: Build
      body: We work in weekly cycles. Each week you see a working increment
        you can try and share internally. Scope evolves with what you learn.
    - icon: grow
      title: Evolve
      body: The software we deliver lives with you. We measure, learn and
        adjust with real usage data. What adds value stays; what does not,
        goes.

blog_section:
  title: Latest news
