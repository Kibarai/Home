cta:
  title: Want to talk about your project?
  body: Tell us what you are working on. We will come back with a first read
    of the challenge and, if it makes sense, a concrete plan to move forward
    with you.
  button_label: Get in touch
  button_url: /en/contact/

pages:
  blog:
    title: News
    subtitle: Technical notes from the team. Day-to-day learnings, real cases
      and decisions we have made along the way.
  servicios:
    title: How we can help
    subtitle: Three ways to work with us, matched to where your product is
      today. If you want a recommendation before deciding, write to us and
      we will tell you where to start.
    cta_title: Would you rather get a recommendation first?
    cta_body: Tell us where you are and what you need. We will tell you where
      to start and what makes sense for you, even when the right partner for
      a part is someone else.
    cta_button_label: Get in touch
    cta_button_url: /en/contact/
  nosotros:
    title: We are Kibarai
    subtitle: A small, independent tech consultancy. We work with people whose
      reputation is on the line when they choose technology — CTOs, product
      leads, founders and IT leaders who need the next decision to land well.
      Our job is that you can defend it with data.
    values_title: How we think
    values:
      - title: Less is more
        body: The best code is the one that solves your problem with the
          least possible complexity. Less surface to maintain means less risk
          for you and for your team.
      - title: Short deliveries
        body: Every week you will see something working. You will take home
          concrete demos and progress you can share with your team or your
          leadership with confidence.
      - title: Technical honesty
        body: We tell you what fits your business and what fits better with
          someone else. Trust is earned by saying what suits you, even when
          it does not suit us.
  contacto:
    title: Let's talk
    subtitle: Tell us what you are working on. What stage you are in, what
      you need and what timeline you have. The more concrete the better. We
      will come back with a first read.
    email_label: Email
    linkedin_label: LinkedIn
    body: A well-written email works. We prefer to hear what you need and
      propose with judgment before filling your inbox.

