  privacy:
    title: Privacy policy
    lede: How we process personal data under GDPR and Spanish LOPDGDD.
    sections:
      - heading: Data controller
        body: |
          - **Controller:** KIBARAI TECH S.L.U.
          - **Tax ID:** B25981762
          - **Registered address:** Paseo de Juan Antonio Vallejo-Nájera Botas 29A 3ºA, 28005 Madrid, Spain
          - **Email:** [contacto@kibarai.tech](mailto:contacto@kibarai.tech)
      - heading: Data we process
        body: |
          Kibarai processes the personal data that the user voluntarily
          provides when contacting us via the email address above or via our
          social profiles. Typical data:

          - First name and surname.
          - Email address.
          - Company or organization, where applicable.
          - Any additional information the user chooses to share in their
            message.
      - heading: Purpose of processing
        body: |
          - Respond to enquiries, information requests or collaboration
            proposals.
          - Manage the commercial and contractual relationship where
            applicable.
          - Comply with applicable legal obligations.
      - heading: Legal basis
        body: |
          The legal basis is the consent of the data subject when sending us
          their communication, and the performance of a contract or
          pre-contractual measures where applicable (Articles 6.1.a and
          6.1.b of Regulation (EU) 2016/679 — GDPR).
      - heading: Retention
        body: |
          Data is kept for as long as necessary to address the user's request
          and, thereafter, for the periods legally required to attend to
          potential liabilities. When data is no longer necessary it is
          deleted using appropriate security measures.
      - heading: Recipients
        body: |
          Data is not shared with third parties except by legal obligation.
          It may be processed by service providers acting as processors
          (hosting, email, productivity tools) under corresponding
          agreements.

          The website is hosted by GitHub Pages (GitHub, Inc., 88 Colin P.
          Kelly Jr. Street, San Francisco, CA 94107, USA).
      - heading: Your rights
        body: |
          You may exercise your rights of access, rectification, erasure,
          objection, restriction of processing and portability by emailing
          [contacto@kibarai.tech](mailto:contacto@kibarai.tech), stating
          your name and attaching a copy of your ID or equivalent document.

          You have the right to lodge a complaint with the **Spanish Data
          Protection Agency** ([aepd.es](https://www.aepd.es)) if you
          consider that the processing does not comply with the applicable
          regulations.
      - heading: Security
        body: |
          Kibarai applies the appropriate technical and organizational
          measures to guarantee the security of personal data and prevent
          its alteration, loss, or unauthorized processing or access.

  cookies:
    title: Cookie policy
    lede: What cookies this website uses and how to manage them.
    sections:
      - heading: What are cookies
        body: |
          A cookie is a small text file that a website stores in the user's
          browser upon visit. Cookies allow the site to recognize the user
          on later visits and remember preferences, and to collect
          statistical information about site usage.
      - heading: Cookies we use
        body: |
          This website **only uses strictly necessary technical cookies** for
          its operation. We do not use analytics, advertising or
          personalization cookies that require user consent under Article
          22.2 of Spanish Law 34/2002 (LSSI-CE).

          The hosting provider (GitHub Pages) may set its own technical
          cookies required to serve pages. These cookies are strictly
          necessary and do not collect data for profiling purposes.
      - heading: How to manage cookies
        body: |
          Users can allow, block or delete cookies installed on their device
          via browser settings. Links to the official instructions for the
          main browsers:

          - [Google Chrome](https://support.google.com/chrome/answer/95647)
          - [Mozilla Firefox](https://support.mozilla.org/en-US/kb/enhanced-tracking-protection-firefox-desktop)
          - [Safari](https://support.apple.com/en-us/guide/safari/sfri11471/mac)
          - [Microsoft Edge](https://support.microsoft.com/en-us/microsoft-edge/delete-cookies-in-microsoft-edge-63947406-40ac-c3b8-57b9-2a946a29ae09)
      - heading: Changes to this policy
        body: |
          Kibarai may modify this cookie policy in response to legislative
          requirements or in order to adapt it to instructions from the
          Spanish Data Protection Agency. We recommend reviewing this policy
          each time you access the website.

          For any questions about this policy, please write to
          [contacto@kibarai.tech](mailto:contacto@kibarai.tech).

