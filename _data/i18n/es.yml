legal_pages:
  legal_notice:
    title: Aviso legal
    lede: Información legal sobre el titular y las condiciones de uso de este
      sitio web.
    sections:
      - heading: Titularidad
        body: |
          En cumplimiento del artículo 10 de la Ley 34/2002, de 11 de julio, de
          Servicios de la Sociedad de la Información y de Comercio Electrónico
          (LSSI-CE), se informa de los datos identificativos del titular de
          este sitio web:

          - **Titular:** KIBARAI TECH S.L.U.
          - **NIF/CIF:** B25981762
          - **Domicilio:** Paseo de Juan Antonio Vallejo-Nájera Botas 29A 3ºA, 28005 Madrid
          - **Actividad:** consultoría tecnológica, desarrollo de software y aplicaciones de IA
          - **Email de contacto:** [contacto@kibarai.tech](mailto:contacto@kibarai.tech)
          - **Teléfono:** 619802580
          - **Datos registrales:** S 8, H M 874314, I/A 1 (7.01.26).
      - heading: Objeto
        body: |
          El presente aviso legal regula el uso del sitio web
          [kibarai.github.io](https://kibarai.github.io/) (en adelante, "el
          sitio web"), del que es titular KIBARAI TECH S.L.U. La navegación
          por el sitio web atribuye la condición de usuario e implica la
          aceptación plena y sin reservas de las presentes condiciones.
      - heading: Condiciones de uso
        body: |
          El usuario se compromete a hacer un uso adecuado de los contenidos y
          servicios del sitio web y a no utilizarlos para:

          - Incurrir en actividades ilícitas o contrarias a la buena fe y al
            orden público.
          - Difundir contenidos de carácter racista, xenófobo, pornográfico,
            de apología del terrorismo o atentatorios contra los derechos
            humanos.
          - Provocar daños en los sistemas físicos y lógicos de Kibarai, de
            sus proveedores o de terceros.
          - Intentar acceder y, en su caso, utilizar las cuentas de correo
            electrónico de otros usuarios y modificar o manipular sus
            mensajes.
      - heading: Propiedad intelectual e industrial
        body: |
          Todos los contenidos del sitio web (textos, fotografías, gráficos,
          imágenes, iconos, tecnología, software, así como su diseño gráfico y
          códigos fuente) son propiedad intelectual de KIBARAI TECH S.L.U. o
          de terceros, sin que puedan entenderse cedidos al usuario ninguno de
          los derechos de explotación reconocidos por la normativa vigente en
          materia de propiedad intelectual sobre los mismos.
      - heading: Enlaces
        body: |
          En el caso de que el sitio web contenga enlaces a otros sitios de
          terceros, Kibarai no ejerce ningún tipo de control sobre dichos
          sitios y contenidos. En ningún caso Kibarai asumirá responsabilidad
          alguna por los contenidos de algún enlace perteneciente a un sitio
          web ajeno.
      - heading: Exclusión de garantías y responsabilidad
        body: |
          Kibarai no se hace responsable, en ningún caso, de los daños y
          perjuicios de cualquier naturaleza que pudieran ocasionar, a título
          enunciativo: errores u omisiones en los contenidos, falta de
          disponibilidad del sitio web o la transmisión de virus o programas
          maliciosos o lesivos en los contenidos, a pesar de haber adoptado
          todas las medidas tecnológicas necesarias para evitarlo.
      - heading: Legislación aplicable
        body: |
          Las relaciones establecidas entre Kibarai y el usuario se regirán
          por lo dispuesto en la normativa vigente sobre la legislación
          aplicable y la jurisdicción competente. Ambas partes se someten, con
          renuncia expresa a cualquier otro fuero, a los juzgados y tribunales
          del domicilio del titular.

  privacy:
    title: Política de privacidad
    lede: Cómo tratamos los datos personales conforme al RGPD y la LOPDGDD.
    sections:
      - heading: Responsable del tratamiento
        body: |
          - **Responsable:** KIBARAI TECH S.L.U.
          - **NIF/CIF:** B25981762
          - **Domicilio:** Paseo de Juan Antonio Vallejo-Nájera Botas 29A 3ºA, 28005 Madrid
          - **Email:** [contacto@kibarai.tech](mailto:contacto@kibarai.tech)
      - heading: Datos que tratamos
        body: |
          Kibarai trata los datos personales que el usuario nos facilita
          voluntariamente al ponerse en contacto con nosotros a través del
          correo electrónico indicado o de nuestros perfiles en redes
          sociales. Los datos habituales son:

          - Nombre y apellidos.
          - Dirección de correo electrónico.
          - Empresa u organización, cuando proceda.
          - Cualquier información adicional que el usuario decida compartir en
            su mensaje.
      - heading: Finalidad del tratamiento
        body: |
          Los datos personales serán tratados para las siguientes finalidades:

          - Responder a consultas, solicitudes de información o propuestas de
            colaboración.
          - Gestionar la relación comercial y contractual cuando proceda.
          - Cumplir con las obligaciones legales aplicables.
      - heading: Base legal
        body: |
          La base legal para el tratamiento de los datos es el consentimiento
          del interesado al enviarnos su comunicación, así como la ejecución
          de un contrato o la aplicación de medidas precontractuales cuando
          proceda (artículo 6.1.a y 6.1.b del Reglamento (UE) 2016/679 —
          RGPD).
      - heading: Conservación
        body: |
          Los datos se conservarán durante el tiempo necesario para atender la
          solicitud del usuario y, posteriormente, durante los plazos
          legalmente exigidos para atender posibles responsabilidades. Cuando
          los datos ya no sean necesarios se suprimirán con medidas de
          seguridad adecuadas.
      - heading: Destinatarios
        body: |
          Los datos no se cederán a terceros salvo obligación legal. Podrán
          ser tratados por proveedores de servicios que actúan como encargados
          del tratamiento (alojamiento, correo, herramientas de productividad)
          con los que existen los correspondientes contratos.

          El sitio web está alojado en GitHub Pages (GitHub, Inc., 88 Colin P.
          Kelly Jr. Street, San Francisco, CA 94107, EE. UU.).
      - heading: Derechos
        body: |
          El usuario puede ejercer los derechos de acceso, rectificación,
          supresión, oposición, limitación del tratamiento y portabilidad
          enviando un correo a
          [contacto@kibarai.tech](mailto:contacto@kibarai.tech), indicando su
          nombre y adjuntando copia de su DNI o documento identificativo
          equivalente.

          El usuario tiene derecho a presentar una reclamación ante la
          **Agencia Española de Protección de Datos** ([aepd.es](https://www.aepd.es))
          si considera que el tratamiento no se ajusta a la normativa vigente.
      - heading: Seguridad
        body: |
          Kibarai aplica las medidas técnicas y organizativas apropiadas para
          garantizar la seguridad de los datos personales y evitar su
          alteración, pérdida, tratamiento o acceso no autorizado.

  cookies:
    title: Política de cookies
    lede: Qué cookies utiliza este sitio web y cómo gestionarlas.
    sections:
      - heading: Qué son las cookies
        body: |
          Una cookie es un pequeño archivo de texto que un sitio web almacena
          en el navegador del usuario al visitarlo. Las cookies permiten
          reconocer al usuario en visitas posteriores y recordar
          preferencias, así como recopilar información estadística sobre el
          uso del sitio.
      - heading: Cookies que utilizamos
        body: |
          Este sitio web **únicamente utiliza cookies técnicas** estrictamente
          necesarias para su funcionamiento. No utilizamos cookies analíticas,
          publicitarias ni de personalización que requieran el consentimiento
          del usuario conforme al artículo 22.2 de la Ley 34/2002 (LSSI-CE).

          El alojamiento del sitio (GitHub Pages) puede establecer cookies
          técnicas propias necesarias para servir las páginas. Estas cookies
          son estrictamente necesarias y no recogen datos con fines de
          perfilado.
      - heading: Cómo gestionar las cookies
        body: |
          El usuario puede permitir, bloquear o eliminar las cookies
          instaladas en su equipo mediante la configuración de las opciones
          del navegador. A continuación se facilitan enlaces a las
          instrucciones oficiales de los principales navegadores:

          - [Google Chrome](https://support.google.com/chrome/answer/95647)
          - [Mozilla Firefox](https://support.mozilla.org/es/kb/habilitar-y-deshabilitar-cookies-sitios-web-rastrear-preferencias)
          - [Safari](https://support.apple.com/es-es/guide/safari/sfri11471/mac)
          - [Microsoft Edge](https://support.microsoft.com/es-es/microsoft-edge/eliminar-las-cookies-en-microsoft-edge-63947406-40ac-c3b8-57b9-2a946a29ae09)
      - heading: Cambios en la política de cookies
        body: |
          Kibarai puede modificar esta política de cookies en función de
          exigencias legislativas o con la finalidad de adaptar dicha política
          a las instrucciones dictadas por la Agencia Española de Protección
          de Datos. Se recomienda revisar esta política cada vez que se
          acceda al sitio web.

          Para cualquier duda sobre esta política puedes escribirnos a
          [contacto@kibarai.tech](mailto:contacto@kibarai.tech).

