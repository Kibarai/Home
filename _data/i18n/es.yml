hero:
  title: Software que funciona. IA que aporta. Decisiones que aguantan.
  subtitle: Trabajamos con quienes se juegan la próxima elección tecnológica de su
    empresa. Hacemos software a medida, integramos IA generativa y ayudamos a
    decidir con criterio antes de comprometer presupuesto. Contigo cada semana,
    con entregas que puedes enseñar a tu equipo y a tu dirección, y con el código
    en tus manos desde el primer día.
  cta_label: Cuéntanos tu proyecto
  cta_url: /es/contacto/
  secondary_cta_label: Ver servicios
  secondary_cta_url: /es/servicios/

home_intro:
  title: Tres cosas hacemos aquí
  body: Consultoría tecnológica, software a medida y aplicaciones con IA. Las
    tres, con equipos pequeños, ciclos cortos y decisiones tomadas contigo.
    Elige por dónde empezar.
  card_link_label: Descubrir más

process:
  title: Un proceso claro y trazable
  subtitle: Ciclos cortos, reuniones semanales y decisiones basadas en datos.
    Verás avanzar tu proyecto cada semana y podrás enseñárselo a tu equipo con
    la tranquilidad de que ya funciona.
  steps:
    - icon: search
      title: Descubrir
      body: Antes de escribir código, entendemos tu negocio, tu equipo y las
        restricciones reales. Si hay un camino más corto para llegar a tu
        objetivo, te lo proponemos con datos delante.
    - icon: build
      title: Construir
      body: Trabajamos en ciclos semanales. Cada semana ves un avance funcional
        que puedes probar y enseñar internamente. El alcance evoluciona con lo
        que descubres.
    - icon: grow
      title: Evolucionar
      body: El software que entregamos vive contigo. Medimos, aprendemos y
        ajustamos con datos de uso real. Lo que aporta se consolida y lo que
        sobra se retira.

