<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bloques acumulados">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3663"/>
      <stop offset="100%" stop-color="#00398f"/>
    </linearGradient>
    <radialGradient id="glowD" cx="50%" cy="60%">
      <stop offset="0%" stop-color="#6e92ff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#6e92ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgD)"/>
  <ellipse cx="800" cy="540" rx="720" ry="380" fill="url(#glowD)"/>
  <!-- Stacked blocks that get tilted / broken as they grow — visual metaphor -->
  <g stroke="#6e92ff" stroke-width="1.6">
    <!-- solid base -->
    <rect x="500" y="620" width="600" height="80" rx="6" fill="#1a2145"/>
    <rect x="500" y="620" width="600" height="80" rx="6" fill="none"/>
    <rect x="530" y="540" width="220" height="80" rx="6" fill="#2d3663"/>
    <rect x="760" y="540" width="180" height="80" rx="6" fill="#2d3663"/>
    <rect x="950" y="540" width="140" height="80" rx="6" fill="#2d3663"/>
    <!-- second row -->
    <rect x="540" y="460" width="180" height="80" rx="6" fill="#2d3663"/>
    <rect x="730" y="460" width="140" height="80" rx="6" fill="#2d3663"/>
    <rect x="880" y="460" width="200" height="80" rx="6" fill="#2d3663"/>
    <!-- third row starting to tilt (with rotate) -->
    <g transform="rotate(-3 620 400)">
      <rect x="560" y="380" width="160" height="80" rx="6" fill="#2d3663"/>
    </g>
    <g transform="rotate(2 780 400)">
      <rect x="720" y="380" width="140" height="80" rx="6" fill="#2d3663"/>
    </g>
    <g transform="rotate(-2 940 400)">
      <rect x="880" y="380" width="180" height="80" rx="6" fill="#2d3663"/>
    </g>
    <!-- fourth row more tilted, with warning accent -->
    <g transform="rotate(-6 620 320)">
      <rect x="570" y="300" width="140" height="80" rx="6" fill="#2d3663"/>
    </g>
    <g transform="rotate(5 780 320)">
      <rect x="720" y="300" width="140" height="80" rx="6" fill="#2d3663"/>
    </g>
    <!-- top row broken / falling -->
    <g transform="rotate(-12 600 240)">
      <rect x="560" y="220" width="120" height="80" rx="6" fill="#00398f" stroke="#b3c6ff"/>
    </g>
    <g transform="rotate(15 800 220)">
      <rect x="760" y="200" width="100" height="80" rx="6" fill="#00398f" stroke="#b3c6ff"/>
    </g>
    <g transform="rotate(-20 940 200)">
      <rect x="900" y="180" width="90" height="80" rx="6" fill="#00398f" stroke="#b3c6ff"/>
    </g>
  </g>
  <!-- warning marks -->
  <circle cx="1240" cy="240" r="10" fill="#6e92ff" opacity=".7"/>
  <circle cx="1240" cy="240" r="20" fill="none" stroke="#6e92ff" stroke-width="2" opacity=".4"/>
  <!-- floating dots -->
  <circle cx="240" cy="240" r="6" fill="#6e92ff" opacity=".55"/>
  <circle cx="200" cy="700" r="10" fill="#6e92ff" opacity=".4"/>
  <circle cx="1400" cy="680" r="7" fill="#b3c6ff" opacity=".5"/>
</svg>
