<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ondas de voz con auricular">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3663"/>
      <stop offset="100%" stop-color="#1a2145"/>
    </linearGradient>
    <radialGradient id="glowC" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6e92ff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#6e92ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgC)"/>
  <ellipse cx="800" cy="450" rx="700" ry="440" fill="url(#glowC)"/>
  <!-- concentric wave rings -->
  <g fill="none" stroke="#6e92ff" stroke-width="1.6">
    <circle cx="800" cy="450" r="120" opacity=".85"/>
    <circle cx="800" cy="450" r="180" opacity=".6"/>
    <circle cx="800" cy="450" r="250" opacity=".4"/>
    <circle cx="800" cy="450" r="325" opacity=".25"/>
    <circle cx="800" cy="450" r="400" opacity=".15"/>
  </g>
  <!-- vertical waveform bars (voice) -->
  <g fill="#b3c6ff">
    <rect x="656" y="426" width="10" height="48" rx="5" opacity=".7"/>
    <rect x="676" y="410" width="10" height="80" rx="5" opacity=".8"/>
    <rect x="696" y="390" width="10" height="120" rx="5" opacity=".85"/>
    <rect x="716" y="366" width="10" height="168" rx="5" opacity=".9"/>
    <rect x="736" y="400" width="10" height="100" rx="5" opacity=".85"/>
    <rect x="756" y="416" width="10" height="68" rx="5" opacity=".8"/>
    <rect x="776" y="386" width="10" height="128" rx="5"/>
    <rect x="796" y="356" width="10" height="188" rx="5"/>
    <rect x="816" y="376" width="10" height="148" rx="5"/>
    <rect x="836" y="396" width="10" height="108" rx="5" opacity=".9"/>
    <rect x="856" y="416" width="10" height="68" rx="5" opacity=".8"/>
    <rect x="876" y="400" width="10" height="100" rx="5" opacity=".85"/>
    <rect x="896" y="386" width="10" height="128" rx="5" opacity=".8"/>
    <rect x="916" y="410" width="10" height="80" rx="5" opacity=".7"/>
    <rect x="936" y="426" width="10" height="48" rx="5" opacity=".6"/>
  </g>
  <!-- phone/handset stylized top-left -->
  <g transform="translate(280 260) rotate(-25)">
    <rect width="140" height="220" rx="70" fill="#6e92ff" opacity=".2"/>
    <rect x="12" y="14" width="116" height="192" rx="58" fill="#1a2145" stroke="#6e92ff" stroke-width="2"/>
    <circle cx="70" cy="58" r="10" fill="#6e92ff"/>
    <rect x="45" y="88" width="50" height="4" rx="2" fill="#6e92ff" opacity=".6"/>
    <rect x="45" y="98" width="50" height="4" rx="2" fill="#6e92ff" opacity=".4"/>
  </g>
  <!-- floating dots -->
  <circle cx="1240" cy="200" r="8" fill="#6e92ff" opacity=".5"/>
  <circle cx="1360" cy="700" r="6" fill="#b3c6ff" opacity=".55"/>
  <circle cx="240" cy="720" r="10" fill="#6e92ff" opacity=".35"/>
</svg>
