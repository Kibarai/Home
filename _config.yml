title: Kibarai
tagline: Consultoría, software a medida y desarrollos con IA
description: Kibarai — consultora tecnológica, software a medida y soluciones con inteligencia artificial.
url: https://kibarai.github.io
baseurl: /Home
email: contacto@kibarai.tech

fallback_lang: en

collections:
  services:
    output: true
  pages_i18n:
    output: false

defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: post }
  - scope: { path: "", type: "services" }
    values: { layout: page }
  - scope: { path: "" }
    values: { layout: page }

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude: [README.md, Gemfile, Gemfile.lock, vendor, .pages.yml, .github]
